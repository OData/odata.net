steps:
- task: NuGetToolInstaller@0
  inputs:
    versionSpec: '6.5.0'

- task: UseDotNet@2
  displayName: 'Install .NET 8 SDK'
  inputs:
    version: '8.x'

- task: PowerShell@2
  inputs:
    targetType: 'inline'
    script: |
      # Write your PowerShell commands here.      
      Write-Host "Hello World"
      [System.Reflection.Assembly]::Load("System.EnterpriseServices, Version=4.0.0.0, Culture=neutral, PublicKeyToken=b03f5f7f11d50a3a")
      $publish = New-Object System.EnterpriseServices.Internal.Publish
      $publish.GacInstall("$(gacUtil)")
      
- task: UseDotNet@2
  displayName: 'Install .NET 10 Preview'
  inputs:
    version: '10.x'

    includePreviewVersions: true

- task: DotNetCoreCLI@2
  displayName: 'Build'  
  inputs:
    command: 'build'
    arguments: '--configuration $(BuildConfiguration) --no-incremental'
    projects: |
      $(Build.SourcesDirectory)\sln\OData.Pipeline.sln

- task: DotNetCoreCLI@2
  displayName: 'Test'
  inputs:
    command: 'test'
    arguments: '--configuration $(buildConfiguration) --settings $(Build.SourcesDirectory)\test.runsettings --no-build'
    projects: |
      # Disable Core and Client E2E tests temporarily pending update of AspNetCoreOData dependency
      # $(Build.SourcesDirectory)\sln\OData.Pipeline.sln
      test/**/*Microsoft.OData.TestCommon.csproj
      test/**/*Microsoft.OData.Core.Tests.csproj
      test/**/*Microsoft.OData.Edm.Tests.csproj
      test/**/*Microsoft.OData.Spatial.Tests.csproj
      test/**/*Microsoft.OData.Client.Tests.csproj
      test/**/Microsoft.OData.E2E.TestCommon.csproj
      !test/**/Microsoft.OData.Core.E2E.Tests.csproj
      test/**/Microsoft.OData.Edm.E2E.Tests.csproj
      !test/**/Microsoft.OData.Client.E2E.Tests.csproj
      !test/**/obj/**
